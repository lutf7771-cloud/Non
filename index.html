<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة فريق لطف التطوعي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f9; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        
        .input-box { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 400px; 
            z-index: 10;
        }
        
        input { 
            width: 85%; 
            padding: 12px; 
            margin: 20px 0; 
            border: 2px solid #013441; 
            border-radius: 8px; 
            font-size: 16px; 
            text-align: center; 
            outline: none; 
        }
        
        button { 
            background-color: #013441; 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
        }
        
        /* حاوية البطاقة - معبية الشاشة ومتناسقة */
        .card-wrapper {
            display: none;
            width: 100%;
            max-width: 550px; 
            margin: 0 auto;
            z-index: 10;
        }

        #capture-area { 
            position: relative; 
            width: 100%; 
        }
        
        .bg-img { 
            width: 100%; 
            display: block; 
            border-radius: 12px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        /* التعديل الجذري: تم وزن الهبوط إلى 72.8% لينزل الاسم داخل المربع الجديد بالملّي */
        /* التعديل: حجم خط ناعم ومناسب جداً لشاشات الجوال */
        #user-name-overlay {
            position: absolute !important;
            top: 72.8% !important; 
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: 52% !important;
            text-align: center !important;
            font-weight: bold !important;
            color: #000000 !important; /* أسود صريح */
            white-space: nowrap !important;
            direction: rtl !important;
            z-index: 99 !important;
            font-size: 12px !important; 
        }
        
        /* ضبط التناسب التلقائي للشاشات الأكبر كالآيباد */
        @media (min-width: 480px) {
            #user-name-overlay {
                font-size: 16px !important; 
            }
        }
        
        /* الأزرار تحت الصورة تلقائياً */
        .controls { 
            display: none; 
            text-align: center; 
            margin-top: 20px; 
            width: 100%;
            max-width: 550px;
            z-index: 10;
        }
        
        .btn-control {
            background-color: #6c757d;
            width: 100%; 
            max-width: 200px;
            padding: 12px 10px;
            font-size: 15px;
            box-sizing: border-box;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup" class="input-box">
        <h2 style="color:#013441; margin-top:0;">معايدة عيد الأضحى 🌙</h2>
        <p style="color:#555;">فريق لطف التطوعي</p>
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا...">
        <br>
        <button onclick="generate()">عرض البطاقة</button>
    </div>

    <div id="card-view" class="card-wrapper">
        <div id="capture-area">
            <img src="bg.png" class="bg-img">
            <div id="user-name-overlay"></div>
        </div>
    </div>

    <div id="controls-area" class="controls">
        <button class="btn-control" onclick="location.reload()">إنشاء بطاقة أخرى</button>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('nameInput').value;
            if(name.trim() !== "") {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('card-view').style.display = 'block';
                document.getElementById('controls-area').style.display = 'block';
                document.getElementById('user-name-overlay').innerText = name;
                
                // تشغيل تأثير الألعاب النارية الاحتفالية
                launchFireworks();
            } else {
                alert("يرجى كتابة الاسم أولاً");
            }
        }

        function launchFireworks() {
            var duration = 4 * 1000; 
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 }
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
